[window]
opacity = 1.0

[font]
normal = { family = "FiraCode Nerd Font" }
size = 12.0

[colors.primary]
foreground = "#cdd6f4"
background = "#000000"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

[[keyboard.bindings]]
key = "B"
mods = "Control|Shift"
action = "ReceiveChar"
